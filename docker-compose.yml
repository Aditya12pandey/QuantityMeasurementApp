services:
  postgres-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quantitydb
    ports:
      - "5432:5432"

  api:
    image: quantity-measurement-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Database=quantitydb;Username=user;Password=password
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
