version: '3.4'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"

  api:
    image: quantity-measurement-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql-server;Database=QuantityMeasurementDB;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
    ports:
      - "8080:8080"
    depends_on:
      - sql-server
